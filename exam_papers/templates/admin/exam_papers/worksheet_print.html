<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Worksheet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
            color: #333;
        }

        .question {
            page-break-inside: avoid;
            margin-bottom: 30px;
        }

        .question-header {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid #ddd;
        }

        .question img {
            max-width: 100%;
            height: auto;
        }

        .no-print {
            text-align: center;
            margin-bottom: 30px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .no-print button {
            padding: 10px 30px;
            font-size: 15px;
            cursor: pointer;
            margin: 0 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
        }

        .no-print button.primary {
            background: #417690;
            color: white;
            border-color: #417690;
        }

        .no-print button:hover {
            opacity: 0.85;
        }

        @media print {
            .no-print {
                display: none;
            }

            body {
                padding: 0;
            }

            .question {
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="no-print">
        <button class="primary" onclick="window.print()">Print / Save as PDF</button>
        <button onclick="window.close()">Close</button>
    </div>

    {% for question in questions %}
    <div class="question">
        <div class="question-header">
            {{ question.exam_paper }} &mdash; Question {{ question.question_number }}
            {% if question.total_marks %}({{ question.total_marks }} marks){% endif %}
        </div>
        {% if question.image %}
        <img src="{{ question.image.url }}" alt="Question {{ question.question_number }}">
        {% endif %}
    </div>
    {% endfor %}
</body>
</html>
